        });
      } catch (err) {
        document.getElementById('matchSelect').innerHTML = '<option>API unavailable - manual entry</option>';
      }
    }

    // NEW: Match change handler
    document.getElementById('matchSelect').addEventListener('change', (e) => {
      const matchId = e.target.value;
      if (!matchId) return;
      const selectedOption = e.target.options[e.target.selectedIndex];
      currentMatch = {
        id: matchId,
        team1: selectedOption.dataset.team1,
        team2: selectedOption.dataset.team2
      };
      document.getElementById('loadTeam1').textContent = `Load ${currentMatch.team1}`;
      document.getElementById('loadTeam2').textContent = `Load ${currentMatch.team2}`;
      document.getElementById('loadTeam1').disabled = false;
      document.getElementById('loadTeam2').disabled = false;
      document.getElementById('squadContainer').innerHTML = '<div class="small">Click to load squad</div>';
      selectedPlayers = []; updateSelected();
    });

    // NEW: Load squad
    async function loadSquad(teamNum) {
      try {
        const res = await fetch(`${APIBASE}/api/squad`);
        //if (!res.ok) throw new Error(await res.text());
        const data = await res.json();
        squads[`team${teamNum}`] = data.players || [];
        renderSquad(teamNum);
      } catch (err) {
        console.error('Squad load failed:', err);
        alert(`Team ${teamNum} squad unavailable—check CricAPI key`);
      }
    }
    document.getElementById('loadTeam1').addEventListener('click', () => loadSquad(1));
    document.getElementById('loadTeam2').addEventListener('click', () => loadSquad(2));

    // NEW: Render selectable squad
    function renderSquad(teamNum) {
      const container = document.getElementById('squadContainer');
      const teamName = currentMatch[`team${teamNum}`];
      container.innerHTML = `<div style="font-weight:600; margin-bottom:8px;">${teamName} (${squads[`team${teamNum}`].length} players)</div>`;
      squads[`team${teamNum}`].forEach((player, idx) => {
        const div = document.createElement('div');
        div.className = 'squad-player';
        div.innerHTML = `
          <label style="display:flex; align-items:center; cursor:pointer; width:100%;">
            <input type="checkbox" style="margin-right:8px; width:16px; height:16px;">
            <span>${player.short_name || player.name}</span>
            <span class="role-badge">${player.credit || player.role || '?'}</span>
          </label>
        `;
        const checkbox = div.querySelector('input');
        checkbox.addEventListener('change', (e) => togglePlayer({ ...player, teamNum }, e.target.checked));
        if (selectedPlayers.some(p => p.pid === player.pid || p.name === player.name)) {
          checkbox.checked = true;
          div.classList.add('selected');
        }
        container.appendChild(div);
      });
    }

    // NEW: Toggle & limit to 11
    function togglePlayer(player, checked) {
      if (checked) {
        if (selectedPlayers.length >= 11) {
          alert('Max 11 players! Deselect first.');
          return;
        }
        selectedPlayers.push(player);
      } else {
        selectedPlayers = selectedPlayers.filter(p => p.pid !== player.pid && p.name !== player.name);
      }
      updateSelected();
    }

    // NEW: Update selected UI
    function updateSelected() {
      document.getElementById('selectedCount').textContent = `(${selectedPlayers.length}/11)`;
      document.getElementById('selectedList').innerHTML = selectedPlayers.map(p => 
        `<span class="chip">${p.short_name || p.name} (${p.teamNum === 1 ? currentMatch.team1[0] : currentMatch.team2[0]})</span>`
      ).join('');
    }

    // Load teams
    async function loadTeams() {
      console.log('Load Teams Called');
      try {
        const res = await fetch(`${APIBASE}/api/teams`);
        teams = await res.json();
        renderTeams();
        renderLeaderboard();
      } catch (err) {
        console.error('Load teams failed', err);
      }
    }

    // Render teams (unchanged)
    function renderTeams() {
      const list = document.getElementById('teamList');
      const count = document.getElementById('teams-count');
      if (!teams.length) {
        list.innerHTML = '<div class="small">Create your first fantasy XI!</div>';
        count.textContent = '0';
        return;
      }
      count.textContent = String(teams.length);
      list.innerHTML = '';
      teams.forEach(t => {
        const row = document.createElement('div');
        row.className = 'team-row';
        const left = document.createElement('div');
        const name = document.createElement('div');
        name.className = 'team-name';
        name.textContent = t.teamName;
        const meta = document.createElement('div');
        meta.className = 'owner-name';
        meta.innerHTML = `${t.ownerName} <span style="font-size:0.65rem; color:#9ca3af; margin-left:4px;">Match: ${t.match}</span>`;
        const players = document.createElement('div');
        players.className = 'player-chips';
        t.players.slice(0, 4).forEach(p => {
          const chip = document.createElement('span');
          chip.className = 'chip';
          chip.textContent = p;
          players.appendChild(chip);
        });
        if (t.players.length > 4) {
          const more = document.createElement('span');
          more.className = 'chip';
          more.textContent = `+${t.players.length - 4}`;
          players.appendChild(more);
        }
        left.append(name, meta, players);
        const right = document.createElement('div');
        right.style.textAlign = 'right';
        right.style.minWidth = '100px';
        const pointsPill = document.createElement('div');
        pointsPill.className = 'points-pill';
        pointsPill.textContent = `${t.points || 0} pts`;
        right.append(pointsPill);
        row.append(left, right);
        list.appendChild(row);
      });
    }

    // Render leaderboard (unchanged)
    function renderLeaderboard() {
      const list = document.getElementById('leaderboardList');
      const sorted = [...teams].sort((a, b) => (b.points || 0) - (a.points || 0));
      if (!sorted.length) {
        list.innerHTML = '<div class="small">Create teams to see rankings</div>';
        return;
      }
      list.innerHTML = '';
      sorted.slice(0, 10).forEach((t, idx) => {
        const row = document.createElement('div');
        row.className = 'team-row';
        const pos = document.createElement('span');
        pos.className = 'points-pill';
        pos.style.minWidth = '24px';
        pos.textContent = `#${idx + 1}`;
        const teamInfo = document.createElement('div');
        teamInfo.innerHTML = `
          <div class="team-name">${t.teamName}</div>
          <div class="owner-name">${t.ownerName} • Match: ${t.match}</div>
        `;
        const points = document.createElement('div');
        points.className = 'points-pill';
        points.textContent = `${t.points || 0} pts`;
        row.append(pos, teamInfo, points);
        list.appendChild(row);
      });
    }

    // UPDATED Save team (uses selectedPlayers)
    document.getElementById('saveTeamBtn').addEventListener('click', async () => {
      const ownerName = document.getElementById('ownerName').value.trim() || 'Manager';
      const teamName = document.getElementById('teamName').value.trim() || 'Untitled';
      const match = document.getElementById('matchSelect').value || 'Practice match';
      if (selectedPlayers.length !== 11) return alert('Select exactly 11 players!');
      const players = selectedPlayers.map(p => p.short_name || p.name);
      try {
        const res = await fetch(`${APIBASE}/api/teams`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ownerName, teamName, match, players })
        });
        if (res.ok) {
          loadTeams();
          alert('Team created! Check My Teams tab');
          // Reset
          selectedPlayers = [];
          document.getElementById('squadContainer').innerHTML = '<div class="small">Select match, then load a team squad</div>';
          document.getElementById('matchSelect').value = '';
          document.getElementById('loadTeam1').disabled = true;
          document.getElementById('loadTeam2').disabled = true;
        } else {
          const err = await res.json();
          alert(`Error: ${err.error || 'Server error'}`);
        }
      } catch (err) {
        alert('Save failed');
      }
    });

    // Initialize
    checkAPI();
    loadLiveMatches();
    loadTeams();
    //setInterval(checkAPI, 30000); // Check API every 30s
  </script>
</body>
</html>
